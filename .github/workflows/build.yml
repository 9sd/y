name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Run
        run: ./build/openssl_demo

  build-freebsd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: cross-platform-actions/action@v0.25.0
        with:
          operating_system: freebsd
          version: '14.2'
          run: |
            sudo pkg install -y cmake openssl
            cmake -B build
            cmake --build build
            ./build/openssl_demo

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y cmake gcc openssl-devel

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run
        run: ./build/openssl_demo
