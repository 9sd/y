name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y libssl-dev

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run
        run: ./build/openssl_demo

  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake"

      - name: Build
        run: cmake --build build --config Release

      - name: Run
        run: ./build/Release/openssl_demo.exe

  build-freebsd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y cmake openssl
          run: |
            cmake -B build
            cmake --build build
            ./build/openssl_demo

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y cmake gcc openssl-devel

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run
        run: ./build/openssl_demo
