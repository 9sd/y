name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update vcpkg
        run: git -C $VCPKG_INSTALLATION_ROOT fetch && git -C $VCPKG_INSTALLATION_ROOT checkout ${{ env.BASELINE }}
        env:
          BASELINE: 40c0d758e1cc99a505b039a9a7e792154119c927

      - name: Configure
        run: cmake -B build -DCMAKE_TOOLCHAIN_FILE=$VCPKG_INSTALLATION_ROOT/scripts/buildsystems/vcpkg.cmake

      - name: Build
        run: cmake --build build

      - name: Run
        run: ./build/openssl_demo

  build-freebsd:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: vmactions/freebsd-vm@v1
        with:
          usesh: true
          prepare: pkg install -y cmake openssl
          run: |
            cmake -B build
            cmake --build build
            ./build/openssl_demo

  build-fedora:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: dnf install -y cmake gcc openssl-devel

      - name: Configure
        run: cmake -B build

      - name: Build
        run: cmake --build build

      - name: Run
        run: ./build/openssl_demo
